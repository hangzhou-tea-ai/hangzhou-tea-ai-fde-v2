<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 686" width="1600" height="686">
  <rect width="1600" height="686" fill="#fafaf8"/>
  <defs>
    <style>
      .meta{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:28px;letter-spacing:6px;fill:#737373;font-weight:600}
      .title{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:72px;fill:#0a0a0a;font-weight:300;letter-spacing:-2px}
      .label{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:28px;fill:#0a0a0a;font-weight:500}
      .small{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:21px;fill:#525252}
      .num{font-family:Inter,Helvetica,sans-serif;font-size:26px;fill:#002FA7;font-weight:600}
    </style>
  </defs>
  <text x="80" y="84" class="meta">CONTENT PILLARS</text>
  <text x="80" y="170" class="title">六个栏目先建立信任</text>
  <line x1="80" y1="218" x2="1520" y2="218" stroke="#d4d4d2" stroke-width="2"/>
  <g transform="translate(80,270)">
    <rect width="210" height="250" fill="#f0f0ee"/>
    <text x="24" y="48" class="num">01</text>
    <text x="24" y="100" class="label">茶文化</text>
    <text x="24" y="138" class="small">六大茶类</text>
    <text x="24" y="170" class="small">节气喝茶</text>
    <line x1="24" y1="210" x2="186" y2="210" stroke="#002FA7" stroke-width="6"/>
  </g>
  <g transform="translate(318,270)">
    <rect width="210" height="250" fill="#002FA7"/>
