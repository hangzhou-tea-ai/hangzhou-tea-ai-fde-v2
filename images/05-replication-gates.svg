<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 686" width="1600" height="686">
  <rect width="1600" height="686" fill="#fafaf8"/>
  <defs>
    <style>
      .meta{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:28px;letter-spacing:6px;fill:#737373;font-weight:600}
      .title{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:72px;fill:#0a0a0a;font-weight:300;letter-spacing:-2px}
      .label{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:30px;fill:#0a0a0a;font-weight:500}
      .small{font-family:Inter,Helvetica,'Noto Sans SC',sans-serif;font-size:22px;fill:#525252}
      .num{font-family:Inter,Helvetica,sans-serif;font-size:34px;fill:#002FA7;font-weight:600}
    </style>
  </defs>
  <text x="80" y="84" class="meta">REPLICATION GATES</text>
  <text x="80" y="170" class="title">复制前先过五道门槛</text>
  <line x1="80" y1="218" x2="1520" y2="218" stroke="#d4d4d2" stroke-width="2"/>
  <g transform="translate(100,300)">
    <line x1="0" y1="90" x2="1360" y2="90" stroke="#d4d4d2" stroke-width="3" stroke-dasharray="8 12"/>
    <g transform="translate(0,0)"><rect width="230" height="180" fill="#f0f0ee"/><text x="24" y="50" class="num">01</text><text x="24" y="96" class="label">内容门槛</text><text x="24" y="134" class="small">2-3 个稳定栏目</text></g>
    <g transform="translate(280,0)"><rect width="230" height="180" fill="#f0f0ee"/><text x="24" y="50" class="num">02</text><text x="24" y="96" class="label">线索门槛</text><text x="24" y="134" class="small">有效咨询可归因</text></g>
    <g transform="translate(560,0)"><rect width="230" height="180" fill="#002FA7"/><text x="24" y="50" class="num" fill="#fff">03</text><text x="24" y="96" class="label" fill="#fff">转化门槛</text><text x="24" y="134" class="small" fill="#fff">深聊到店跑通</text></g>
    <g transform="translate(840,0)"><rect width="230" height="180" fill="#f0f0ee"/><text x="24" y="50" class="num">04</text><text x="24" y="96" class="label">组织门槛</text><text x="24" y="134" class="small">分工与复盘机制</text></g>
    <g transform="translate(1120,0)"><rect width="250" height="180" fill="#0a0a0a"/><text x="24" y="50" class="num" fill="#fff">05</text><text x="24" y="96" class="label" fill="#fff">合规门槛</text><text x="24" y="134" class="small" fill="#fff">审核与话术禁区</text></g>
  </g>
  <text x="100" y="610" class="small">只有五类门槛成立，才从苏苏样板扩展到 2-3 个主理人小范围复制。</text>
</svg>
