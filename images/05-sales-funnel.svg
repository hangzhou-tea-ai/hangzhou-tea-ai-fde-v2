  <text x="610" y="590" class="num" fill="#fff">03</text><text x="675" y="590" class="label" fill="#fff">到店深聊 / 9800 讲解</text><text x="675" y="626" class="small" fill="#fff">3 分钟权益说明 + 异议处理 + 跟进</text>
