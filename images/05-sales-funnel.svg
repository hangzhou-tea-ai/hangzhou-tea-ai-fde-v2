  <g transform="translate(80,300)">
    <polygon points="0,0 1440,0 1270,90 170,90" fill="#f0f0ee"/>
    <polygon points="170,118 1270,118 1120,208 320,208" fill="#f0f0ee"/>
    <polygon points="320,236 1120,236 970,326 470,326" fill="#002FA7"/>
